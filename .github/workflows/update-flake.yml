name: Update flake inputs
on:
  schedule:
    - cron: '0 6,18 * * *' # Every 12 hours at 06:00 and 18:00 UTC
  workflow_dispatch:
concurrency:
  group: flake-update
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      warnings-before: ${{ steps.before.outputs.warnings }}
      warnings-after: ${{ steps.after.outputs.warnings }}
      check-failed: ${{ steps.after.outputs.check-failed }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: den
          skipPush: true
      - name: Check warnings before update
        id: before
        run: |
          nix flake check 2> check-before.log || true
          count=$(grep -ci 'warning:' check-before.log || echo 0)
          echo "warnings=$count" >> "$GITHUB_OUTPUT"
          echo "Warnings before update: $count"
      - name: Update flake inputs
        run: |
          nix flake update 2>&1 | tee update-output.log
          echo '### Flake update' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat update-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo ':white_check_mark: No changes to flake.lock' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo ':arrow_up: flake.lock has been updated' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Check warnings after update
        if: steps.changes.outputs.changed == 'true'
        id: after
        run: |
          if nix flake check 2> check-after-raw.log; then
            echo "check-failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "check-failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::nix flake check failed after update"
          fi
          grep -iv -e 'has uncommitted changes' -e 'Git tree.*is dirty' check-after-raw.log > check-after.log || true
          count=$(grep -ci 'warning:' check-after.log || echo 0)
          echo "warnings=$count" >> "$GITHUB_OUTPUT"
          echo "Warnings after update: $count (before: ${{ steps.before.outputs.warnings }})"
      - name: Upload update artifacts
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: update-data
          path: |
            flake.lock
            update-output.log
            check-before.log
            check-after.log
  build:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      artifact-name: update-data
      upload-error-logs: true
      fail-fast: false
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  heal:
    # Self-heal scoped to one specific recurring failure: the
    # caddy.withPlugins fixed-output hash drifting when nixpkgs bumps
    # the Caddy version underneath our pinned plugins. Any other
    # build failure falls through to the normal PR-for-review path.
    runs-on: ubuntu-latest
    needs: [update, build]
    if: >-
      always() && needs.update.outputs.changed == 'true' && needs.build.result == 'failure'
    outputs:
      matched: ${{ steps.detect.outputs.matched }}
      new-hash: ${{ steps.detect.outputs.new-hash }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: update-data
      - uses: actions/download-artifact@v8
        with:
          pattern: error-*
          path: errors
        continue-on-error: true
      - name: Detect caddy plugin hash mismatch
        id: detect
        run: |
          # Require BOTH a caddy-src-with-plugins reference AND a
          # `got: sha256-...` line in the same log file. Stops us from
          # grabbing a hash from some unrelated FOD that happened to fail
          # in the same run.
          match_log=$(grep -lE 'caddy-src-with-plugins.*\.drv' errors/error-*/build.log 2>/dev/null | head -1 || true)
          if [ -z "$match_log" ]; then
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo 'No `caddy-src-with-plugins` reference in any error log — not a heal candidate.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          new_hash=$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' "$match_log" | head -1 | awk '{print $2}')
          if [ -z "$new_hash" ]; then
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Caddy reference found in \`$match_log\` but no \`got: sha256-...\` line — not a heal candidate." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "matched=true" >> "$GITHUB_OUTPUT"
          echo "new-hash=$new_hash" >> "$GITHUB_OUTPUT"
          {
            echo '### Caddy plugin hash drift detected'
            echo "- Log: \`$match_log\`"
            echo "- New hash: \`$new_hash\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Patch hash in reverse-proxy.nix
        if: steps.detect.outputs.matched == 'true'
        run: |
          new_hash='${{ steps.detect.outputs.new-hash }}'
          file=modules/features/network/reverse-proxy.nix
          # Defense in depth: refuse to patch unless exactly one matching
          # hash line is present. Future-proofs against accidentally
          # rewriting an unrelated FOD added to the same file later.
          count=$(grep -cE '^[[:space:]]+hash = "sha256-[^"]*";' "$file")
          if [ "$count" != "1" ]; then
            echo "::error::Expected exactly one hash line in $file, found $count."
            exit 1
          fi
          sed -i -E "s|(^[[:space:]]+hash = )\"sha256-[^\"]*\"|\1\"$new_hash\"|" "$file"
          git --no-pager diff -- "$file"
      - name: Re-upload artifact with patched file
        if: steps.detect.outputs.matched == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: update-data
          overwrite: true
          path: |
            flake.lock
            modules/features/network/reverse-proxy.nix
            update-output.log
            check-before.log
            check-after.log
  heal-build:
    needs: [update, heal]
    if: >-
      always() && needs.heal.outputs.matched == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      artifact-name: update-data
      upload-error-logs: true
      fail-fast: false
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  finalize:
    runs-on: ubuntu-latest
    needs: [update, build, heal, heal-build]
    if: >-
      always() && needs.update.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: update-data
      - name: Download error logs
        uses: actions/download-artifact@v8
        with:
          pattern: error-*
          path: errors
        continue-on-error: true
      - name: Decide outcome
        id: decide
        run: |
          echo '### Finalize' >> "$GITHUB_STEP_SUMMARY"
          # Effective build result: heal-build supersedes the original build
          # when the self-heal path ran successfully.
          if [ "${{ needs.build.result }}" = "success" ]; then
            effective_build="success"
            hash_refreshed="false"
          elif [ "${{ needs.heal.outputs.matched }}" = "true" ] && [ "${{ needs.heal-build.result }}" = "success" ]; then
            effective_build="success"
            hash_refreshed="true"
            echo ':wrench: Caddy plugin hash auto-refreshed and rebuild passed' >> "$GITHUB_STEP_SUMMARY"
          else
            effective_build="failure"
            hash_refreshed="false"
            if [ "${{ needs.heal.outputs.matched }}" = "true" ]; then
              echo ':warning: Heal attempted (hash refreshed) but rebuild still failed' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "hash-refreshed=$hash_refreshed" >> "$GITHUB_OUTPUT"
          if [ "${{ needs.update.outputs.check-failed }}" = "true" ]; then
            echo "action=pr" >> "$GITHUB_OUTPUT"
            echo "reason=check-failure" >> "$GITHUB_OUTPUT"
            echo ':x: `nix flake check` failed after update — creating PR for review' >> "$GITHUB_STEP_SUMMARY"
          elif [ "$effective_build" = "failure" ]; then
            echo "action=pr" >> "$GITHUB_OUTPUT"
            echo "reason=build-failure" >> "$GITHUB_OUTPUT"
            echo ':x: Build failures detected — creating PR for review' >> "$GITHUB_STEP_SUMMARY"
          else
            before=${{ needs.update.outputs.warnings-before }}
            after=${{ needs.update.outputs.warnings-after }}
            if [ "$after" -gt "$before" ]; then
              echo "action=pr" >> "$GITHUB_OUTPUT"
              echo "reason=new-warnings" >> "$GITHUB_OUTPUT"
              echo ":warning: New warnings ($before → $after) — creating PR for review" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "action=commit" >> "$GITHUB_OUTPUT"
              echo ':white_check_mark: All builds passed — committing directly to main' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
      - name: Close stale update PR
        if: steps.decide.outputs.action == 'commit'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=$(gh pr list --head auto/flake-update --json number --jq '.[0].number')
          if [ -n "$pr" ]; then
            gh pr close "$pr" --delete-branch --comment "Superseded by direct commit to main (no new warnings)."
          fi
      - name: Commit directly to main
        if: steps.decide.outputs.action == 'commit'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          if [ "${{ steps.decide.outputs.hash-refreshed }}" = "true" ]; then
            git add modules/features/network/reverse-proxy.nix
            subject='flake.lock: update flake inputs + refresh caddy plugin hash'
            footer=$'\n\nCaddy plugin bundle hash auto-refreshed after the nixpkgs\nbump moved the underlying Caddy version. See reverse-proxy.nix.'
          else
            subject='flake.lock: update flake inputs'
            footer=''
          fi
          git commit -m "$(printf '%s\n\nFlake lock file updates:\n\n%s%s' "$subject" "$(cat update-output.log)" "$footer")"
          git push
      - name: Build PR body
        if: steps.decide.outputs.action == 'pr'
        id: pr-body
        run: |
          {
            echo 'body<<EOF'
            echo 'Automated flake input update.'
            echo ''
            echo '### Updated inputs'
            echo '```'
            cat update-output.log
            echo '```'

            if [ "${{ steps.decide.outputs.reason }}" = "check-failure" ]; then
              echo ''
              echo '### Flake check failure'
              echo '`nix flake check` **failed** after updating inputs.'
              echo ''
              echo '```'
              cat check-after.log 2>/dev/null || echo 'No log available'
              echo '```'
            fi

            if [ "${{ steps.decide.outputs.reason }}" = "build-failure" ]; then
              echo ''
              echo '### Build failures'
              echo 'The following configurations **failed to build** after updating inputs.'
              if [ "${{ needs.heal.outputs.matched }}" = "true" ]; then
                echo ''
                echo ':wrench: A caddy plugin hash drift was detected and auto-patched, but the rebuild still failed.'
                echo "New hash applied: \`${{ needs.heal.outputs.new-hash }}\`"
                echo ''
              fi
              if [ -d errors ]; then
                for dir in errors/error-*/; do
                  [ -d "$dir" ] || continue
                  name=$(basename "$dir" | sed 's/^error-//')
                  echo ''
                  echo "#### $name"
                  echo '```'
                  cat "$dir/build.log"
                  echo '```'
                done
              fi
            fi

            if [ "${{ steps.decide.outputs.reason }}" = "new-warnings" ]; then
              echo ''
              echo '### New warnings'
              echo '`nix flake check` passed but introduced **new warnings**.'
              echo ''
              echo "#### Before (${{ needs.update.outputs.warnings-before }})"
              echo '```'
              grep -i 'warning:' check-before.log || echo 'No warnings'
              echo '```'
              echo ''
              echo "#### After (${{ needs.update.outputs.warnings-after }})"
              echo '```'
              grep -i 'warning:' check-after.log || echo 'No warnings'
              echo '```'
            fi

            echo ''
            echo 'Review before merging.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Create PR for review
        if: steps.decide.outputs.action == 'pr'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update flake inputs"
          title: >-
            chore: update flake inputs (${{ steps.decide.outputs.reason == 'check-failure' && 'check failure' || steps.decide.outputs.reason == 'build-failure' && 'build failure' || 'new warnings' }})
          branch: auto/flake-update
          delete-branch: true
          body: ${{ steps.pr-body.outputs.body }}
